{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-body p-5">
                <h3 class="card-title text-center fw-bold text-primary mb-4">{{ _('Login') }}</h3>

                {% if error %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    {{ error }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endif %}

                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label class="form-label text-muted">{{ _('Email or Name') }}</label>
                        <input type="text" name="identifier" class="form-control form-control-lg"
                            placeholder="{{ _('example@lab.edu or Test Student') }}" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted">{{ _('Password') }}</label>
                        <input type="password" name="password" class="form-control form-control-lg" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">{{ _('Login') }}</button>
                </form>

                <div class="text-center mt-4">
                    <span class="text-muted">{{ _("Don't have an account?") }} </span>
                    <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-medium">{{ _('Register
                        here') }}</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
