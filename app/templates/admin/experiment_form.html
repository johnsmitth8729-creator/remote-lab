{% extends "base.html" %}

{% block title %}{% if experiment %}Edit{% else %}Create{% endif %} Experiment - RemoteLab{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h2 class="section-title mb-4">{% if experiment %}Edit{% else %}Create New{% endif %} Experiment</h2>
        <div class="card lab-card">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label">Experiment Title</label>
                            <input type="text" name="title" class="form-control"
                                placeholder="e.g. Ultrasonic Sensor Guide"
                                value="{{ experiment.title if experiment else '' }}" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Type</label>
                            <select name="type" class="form-select">
                                <option value="arduino" {% if experiment and experiment.type=='arduino' %}selected{%
                                    endif %}>Arduino</option>
                                <option value="raspberry_pi_pico" {% if experiment and
                                    experiment.type=='raspberry_pi_pico' %}selected{% endif %}>Raspberry Pi Pico
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description (Short summary)</label>
                        <textarea name="description" class="form-control" rows="2"
                            required>{{ experiment.description if experiment else '' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Objectives & Instructions (Markdown supported)</label>
                        <textarea name="instructions" class="form-control"
                            rows="6">{{ experiment.instructions if experiment else '' }}</textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Category</label>
                            <input type="text" name="category" class="form-control" placeholder="e.g. Sensors, IoT"
                                value="{{ experiment.category if experiment else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Difficulty</label>
                            <select name="difficulty" class="form-select">
                                <option value="easy" {% if experiment and experiment.difficulty=='easy' %}selected{%
                                    endif %}>Easy</option>
                                <option value="medium" {% if (experiment and experiment.difficulty=='medium' ) or not
                                    experiment %}selected{% endif %}>Medium</option>
                                <option value="hard" {% if experiment and experiment.difficulty=='hard' %}selected{%
                                    endif %}>Hard</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Wokwi Simulator URL</label>
                        <input type="url" name="wokwi_url" class="form-control"
                            placeholder="https://wokwi.com/projects/..."
                            value="{{ experiment.wokwi_url if experiment else '' }}" required>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary px-5">{% if experiment %}Save Changes{% else
                            %}Publish Lab{% endif %}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
